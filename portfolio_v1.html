<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--surface:#111318;--surface2:#181c24;
  --border:#1e2330;--border2:#252d3d;
  --text:#e2e8f0;--muted:#4a5568;--muted2:#718096;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.12);
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;min-height:100vh;}

/* ── HEADER ── */
header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:200;gap:10px;flex-wrap:wrap;}
.logo{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted2);}
.logo span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.updated-info{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right;line-height:1.7;}
.upd-time{color:var(--green);}
.upd-stale{color:var(--yellow);}
.db-badge{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;padding:3px 8px;border-radius:3px;border:1px solid;white-space:nowrap;}
.db-ok{color:var(--green);background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.25);}
.db-err{color:var(--red);background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.25);}
.db-loading{color:var(--yellow);background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.25);}

.hbtn{display:flex;align-items:center;gap:6px;border-radius:6px;padding:7px 12px;font-family:var(--mono);font-size:10px;letter-spacing:0.07em;cursor:pointer;transition:all 0.15s;border:1px solid;white-space:nowrap;background:var(--surface);}
.btn-refresh{border-color:var(--border2);color:var(--text);}
.btn-refresh:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn-refresh:disabled{opacity:0.4;cursor:not-allowed;}
.btn-add{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.btn-add:hover{background:var(--accent);color:#fff;}
.btn-cols{border-color:var(--border2);color:var(--muted2);position:relative;}
.btn-cols:hover{color:var(--text);}
.btn-view{border-color:var(--border2);color:var(--muted2);}
.btn-view:hover{color:var(--text);}
.btn-view.mobile-active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
@keyframes spin{to{transform:rotate(360deg);}}
.spinning{animation:spin 0.8s linear infinite;}

/* ── COL DROPDOWN ── */
.col-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;z-index:400;}
.col-dropdown.open{display:block;}
.col-dd-title{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:4px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.col-toggle{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:4px;cursor:pointer;transition:background 0.1s;}
.col-toggle:hover{background:var(--surface2);}
.col-toggle input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;flex-shrink:0;}
.col-toggle label{font-family:var(--mono);font-size:10px;color:var(--muted2);cursor:pointer;}
.col-toggle.on label{color:var(--text);}

/* ── SUMMARY ── */
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.scard{background:var(--surface);padding:14px 18px;position:relative;overflow:hidden;transition:background 0.15s;}
.scard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform 0.25s;transform-origin:left;}
.scard:hover{background:var(--surface2);}
.scard:hover::after{transform:scaleX(1);}
.slabel{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.sval{font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:-0.02em;color:var(--text);}
.ssub{font-size:10px;color:var(--muted2);margin-top:3px;}
.sval.accent{color:var(--accent);}
.sval.green{color:var(--green);}
.sval.red{color:var(--red);}

/* ── ALLOC + BUCKETS ── */
.alloc-bar{display:flex;height:3px;}
.alloc-seg{height:100%;}
.slabel-row{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:10px 24px 0;}
.bucket-row{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);overflow-x:auto;}
.bpill{flex:1;min-width:82px;background:var(--surface);padding:10px 12px;cursor:pointer;transition:background 0.15s;border-top:2px solid transparent;white-space:nowrap;}
.bpill:hover{background:var(--surface2);}
.bpill.active{background:var(--surface2);}
.bname{font-family:var(--mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px;}
.bval{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);}
.bpct{font-size:10px;color:var(--muted2);margin-top:1px;}

/* ── CONTROLS ── */
.controls{padding:10px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:260px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:7px 12px 7px 32px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;transition:border-color 0.15s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--muted);}
.fgroup{display:flex;gap:5px;flex-wrap:wrap;}
.fbtn{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:5px 10px;color:var(--muted2);font-family:var(--mono);font-size:9px;letter-spacing:0.08em;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.fbtn:hover{border-color:var(--accent);color:var(--text);}
.fbtn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.spacer{flex:1;}
.rcount{font-family:var(--mono);font-size:10px;color:var(--muted);}

/* ── DESKTOP TABLE ── */
.twrap{overflow-x:auto;padding:0 24px 40px;}
table{width:100%;border-collapse:collapse;margin-top:14px;}
thead tr{border-bottom:1px solid var(--border2);}
th{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:left;user-select:none;white-space:nowrap;}
th.sort{cursor:pointer;}
th.sort:hover{color:var(--text);}
th .si{display:inline-block;margin-left:3px;opacity:0.3;font-size:8px;}
th.sorted .si{opacity:1;color:var(--accent);}
th.r{text-align:right;}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,0.013);}
tr:last-child td{border-bottom:none;}
.hcol{display:none!important;}

/* PRICE DOT */
.price-cell{display:inline-flex;align-items:center;gap:5px;justify-content:flex-end;width:100%;}
.price-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:var(--green);}
.dot-err{background:var(--red);}
.dot-none{background:var(--muted);opacity:0.4;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.dot-loading{background:var(--yellow);animation:pulse 0.8s ease-in-out infinite;}

/* CELLS */
.cticker{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--text);}
.cacct{font-family:var(--mono);font-size:9px;color:var(--muted2);background:var(--surface2);padding:2px 6px;border-radius:3px;border:1px solid var(--border2);display:inline-block;white-space:nowrap;}
.cnum{font-family:var(--mono);font-size:12px;text-align:right;}
.cnum.bold{color:var(--text);font-weight:500;}
.cnum.green{color:var(--green);}
.cnum.red{color:var(--red);}
.cprice{font-family:var(--mono);font-size:11px;color:var(--muted2);}

.editable{font-family:var(--mono);font-size:12px;text-align:right;color:var(--text);background:transparent;border:1px solid transparent;border-radius:3px;padding:2px 5px;width:90px;outline:none;transition:all 0.15s;}
.editable:hover{border-color:var(--border2);}
.editable:focus{border-color:var(--accent);background:var(--surface2);}
.editable.dim{color:var(--muted2);}
.editable.dim:focus{color:var(--text);}

/* BUCKET TAG */
.btag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;letter-spacing:0.07em;padding:3px 7px;border-radius:3px;border:1px solid;white-space:nowrap;}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.b-crypto  {color:#f59e0b;border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.07);}
.b-chinese {color:#f97316;border-color:rgba(249,115,22,0.3);background:rgba(249,115,22,0.07);}
.b-health  {color:#10b981;border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.07);}
.b-fintech {color:#3b82f6;border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.07);}
.b-semi    {color:#8b5cf6;border-color:rgba(139,92,246,0.3);background:rgba(139,92,246,0.07);}
.b-ai      {color:#06b6d4;border-color:rgba(6,182,212,0.3); background:rgba(6,182,212,0.07);}
.b-energy  {color:#84cc16;border-color:rgba(132,204,22,0.3);background:rgba(132,204,22,0.07);}
.b-silver  {color:#94a3b8;border-color:rgba(148,163,184,0.3);background:rgba(148,163,184,0.07);}
.b-cash    {color:#64748b;border-color:rgba(100,116,139,0.3);background:rgba(100,116,139,0.07);}
.b-home    {color:#ec4899;border-color:rgba(236,72,153,0.3);background:rgba(236,72,153,0.07);}
.b-autonomy{color:#a78bfa;border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.07);}
.b-consumer{color:#fb923c;border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.07);}

/* ACTION */
.atog{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:0.1em;padding:3px 10px;border-radius:3px;text-transform:uppercase;display:inline-block;border:1px solid;cursor:pointer;user-select:none;transition:all 0.12s;}
.atog:hover{filter:brightness(1.25);}
.at-hold   {color:var(--muted2);border-color:var(--border2);background:var(--surface2);}
.at-monitor{color:var(--yellow);border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.08);}
.at-sell   {color:var(--red);border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.08);}
.at-buy    {color:var(--green);border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.08);}

/* PCT BAR */
.pbar-wrap{display:flex;align-items:center;gap:7px;min-width:80px;}
.pbar{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;}
.pbar-label{font-family:var(--mono);font-size:10px;color:var(--muted2);min-width:32px;text-align:right;}

/* NOTES */
.note-inp{width:100%;background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 6px;color:var(--muted2);font-family:var(--sans);font-size:11px;resize:none;outline:none;transition:all 0.15s;line-height:1.4;min-height:24px;}
.note-inp:focus{border-color:var(--border2);background:var(--surface2);color:var(--text);}
.note-inp::placeholder{color:var(--muted);font-style:italic;}

.del-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:3px;font-size:13px;line-height:1;transition:all 0.15s;}
.del-btn:hover{color:var(--red);background:rgba(239,68,68,0.1);}

/* ── MOBILE CARD VIEW ── */
.mobile-view{display:none;padding:12px 16px 40px;}
.mobile-view.active{display:block;}
.twrap.hidden{display:none;}
.controls.hidden-mobile{display:none;}

.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pos-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.pos-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:10px 0 0 10px;}
.pos-card:hover{border-color:var(--border2);background:var(--surface2);}
.pos-card:active{transform:scale(0.98);}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-ticker{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--text);}
.card-account{font-family:var(--mono);font-size:9px;color:var(--muted2);margin-top:2px;}
.card-action{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:0.1em;padding:2px 7px;border-radius:3px;border:1px solid;text-transform:uppercase;}
.card-value{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.02em;margin-bottom:4px;}
.card-price-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.card-price{font-family:var(--mono);font-size:11px;color:var(--muted2);}
.card-pl{font-family:var(--mono);font-size:12px;font-weight:500;}
.card-pl.green{color:var(--green);}
.card-pl.red{color:var(--red);}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.card-pct{font-family:var(--mono);font-size:10px;color:var(--muted2);}
.card-bucket{font-family:var(--mono);font-size:9px;letter-spacing:0.06em;padding:2px 6px;border-radius:3px;border:1px solid;}

/* CARD EXPAND */
.card-expand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.card-expand.open{display:block;}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
.card-row-label{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
.card-row-val{font-family:var(--mono);font-size:11px;color:var(--text);}
.card-edit{background:transparent;border:1px solid var(--border2);border-radius:3px;padding:2px 6px;color:var(--text);font-family:var(--mono);font-size:11px;width:90px;text-align:right;outline:none;}
.card-edit:focus{border-color:var(--accent);}
.card-note{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:6px 8px;color:var(--muted2);font-family:var(--sans);font-size:11px;resize:none;outline:none;margin-top:6px;}
.card-note:focus{border-color:var(--accent);color:var(--text);}
.card-del{font-family:var(--mono);font-size:9px;color:var(--red);background:transparent;border:1px solid rgba(239,68,68,0.3);border-radius:4px;padding:4px 10px;cursor:pointer;margin-top:8px;width:100%;}
.card-del:hover{background:rgba(239,68,68,0.1);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px 18px;font-family:var(--mono);font-size:11px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(16,185,129,0.4);color:var(--green);}
.toast.err{border-color:rgba(239,68,68,0.4);color:var(--red);}

/* ── LOADING ── */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
.loading-screen.gone{display:none;}
.spin{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
.loading-text{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.1em;}
.loading-err{font-family:var(--mono);font-size:11px;color:var(--red);text-align:center;max-width:440px;line-height:1.9;padding:0 20px;}
.loading-err code{color:var(--yellow);font-size:10px;}
.loading-err a{color:var(--accent);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:24px;width:480px;max-width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text);margin-bottom:18px;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mfield{display:flex;flex-direction:column;gap:5px;}
.mfield.full{grid-column:span 2;}
.mlabel{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.minput{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color 0.15s;width:100%;}
.minput:focus{border-color:var(--accent);}
select.minput option{background:var(--surface2);}
.mactions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.mbtn{border-radius:5px;padding:8px 18px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all 0.15s;border:1px solid;}
.mbtn-cancel{background:transparent;border-color:var(--border2);color:var(--muted2);}
.mbtn-cancel:hover{border-color:var(--text);color:var(--text);}
.mbtn-save{background:var(--accent);border-color:var(--accent);color:#fff;}
.mbtn-save:hover{background:#2563eb;}

.empty{padding:60px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .summary-bar{grid-template-columns:repeat(3,1fr);}
  header,.controls,.twrap,.slabel-row,.mobile-view{padding-left:16px;padding-right:16px;}
}
@media(max-width:430px){
  .summary-bar{grid-template-columns:repeat(2,1fr);}
  .card-grid{grid-template-columns:1fr;}
  .mgrid{grid-template-columns:1fr;}
  .mfield.full{grid-column:span 1;}
  .updated-info{display:none;}
}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spin"></div>
  <div class="loading-text" id="loading-text">Connecting to Supabase…</div>
  <div class="loading-err" id="loading-err" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="logo"><span>//</span> PORTFOLIO</div>
  <div class="header-right">
    <div class="db-badge db-loading" id="db-badge">⬤ Connecting…</div>
    <div class="updated-info">
      <div>Prices: <span id="upd-time" class="upd-stale">never</span></div>
      <div id="upd-src" style="font-size:9px;color:var(--muted)">Yahoo Finance · CoinGecko</div>
    </div>

    <!-- View toggle -->
    <button class="hbtn btn-view" id="view-btn" onclick="toggleView()">

// ─── COMPUTE ─────────────────────────────────────────────────────────────────
function compute(p){
  p.value = p.fixed_value!=null ? p.fixed_value
    : (p.shares!=null&&p.price!=null) ? +(p.shares*p.price).toFixed(2) : null;
  if(p.cost_basis!=null&&p.price!=null&&p.shares!=null){
    p.pl_usd=+((p.price-p.cost_basis)*p.shares).toFixed(2);
    p.pl_pct=+(((p.price-p.cost_basis)/p.cost_basis)*100).toFixed(2);
  } else { p.pl_usd=null; p.pl_pct=null; }
  return p;
}
function computeAll(){ positions.forEach(compute); }

// ─── FORMAT ──────────────────────────────────────────────────────────────────
function fD(v){
  if(v===null||v===undefined) return '—';
  const neg=v<0,a=Math.abs(v);
  const s=a>=1000000?'$'+(a/1000000).toFixed(2)+'M':a>=1000?'$'+Math.round(a).toLocaleString('en-US'):'$'+a.toFixed(2);
  return neg?'−'+s:s;
}
function fS(v){ if(v===null||v===undefined) return '—'; if(v<1) return v.toFixed(6); return v>=10000?v.toLocaleString('en-US'):String(v); }
function fP(v){ if(v===null||v===undefined) return '—'; if(v<1) return '$'+v.toFixed(4); return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

}

// ─── PRICE REFRESH via Edge Function ─────────────────────────────────────────
async function refreshPrices(){
  const btn=document.getElementById('refresh-btn');
  const icon=document.getElementById('refresh-icon');
  btn.disabled=true; icon.classList.add('spinning');
  toast('Fetching live prices…');

  // Mark all priceable positions as loading
  positions.forEach(p=>{ if(p.shares!=null&&p.fixed_value==null) priceStatus[p.ticker.toUpperCase()]='loading'; });
  renderTable(); renderCards();

  const equityTickers=[...new Set(
    positions.filter(p=>p.shares!=null&&p.fixed_value==null&&!CRYPTO_IDS[p.ticker.toUpperCase()])
             .map(p=>p.ticker.toUpperCase())
  )];
  const cryptoKeys=[...new Set(
    positions.filter(p=>CRYPTO_IDS[p.ticker.toUpperCase()]).map(p=>p.ticker.toUpperCase())
  )];
  const cryptoIds=cryptoKeys.map(k=>CRYPTO_IDS[k]);

  let updCount=0, failCount=0;
  const priceMap={};

  try{
    // Call the Supabase Edge Function — server-side, no CORS issues
    const res=await fetch(EDGE_FN,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${SB_KEY}`},
      body:JSON.stringify({tickers:equityTickers, cryptoIds}),
    });
    if(!res.ok) throw new Error(`Edge function error: ${res.status} ${await res.text()}`);
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'Unknown edge function error');

    // Map results back
    for(const [key,price] of Object.entries(data.prices)){
      if(key.startsWith('__crypto__')){
        const cgId=key.replace('__crypto__','');
        // find which ticker maps to this CoinGecko ID
        cryptoKeys.forEach(t=>{ if(CRYPTO_IDS[t]===cgId && price) priceMap[t]=price; });
      } else {
        if(price) priceMap[key]=price;
      }
    }
  } catch(e){
    // Edge Function not deployed yet — fall back to direct fetch with CORS proxy
    console.warn('Edge function unavailable, falling back to CORS proxy:', e.message);
    toast('Edge function not deployed — trying fallback…');

    await Promise.all([
      // Equities via allorigins proxy
      ...equityTickers.map(async ticker=>{
        try{
          const url=`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`)}`;
          const r=await fetch(url);
          const w=await r.json();
          const d=JSON.parse(w.contents);
          const meta=d?.chart?.result?.[0]?.meta;
          const price=meta?.regularMarketPrice??meta?.previousClose;
          if(price&&price>0) priceMap[ticker]=price;
        } catch(_){ console.warn('Fallback failed for',ticker); }
      }),
      // Crypto direct (CoinGecko supports CORS)
      cryptoIds.length ? fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cryptoIds.join(',')}&vs_currencies=usd`)
        .then(r=>r.json())
        .then(d=>{ cryptoKeys.forEach(t=>{ const id=CRYPTO_IDS[t]; if(d[id]?.usd) priceMap[t]=d[id].usd; }); })
        .catch(()=>{}) : Promise.resolve()
    ]);
  }

  // Apply prices and update status dots
  const now=new Date().toISOString();
  const historyRows=[];

  for(const p of positions){
    const key=p.ticker.toUpperCase();
    if(priceMap[key]!==undefined){
      p.price=priceMap[key]; compute(p);
      priceStatus[key]='ok'; updCount++;
      historyRows.push({ticker:p.ticker,price:p.price,fetched_at:now});
      sbPatch('positions',p.id,{price:p.price}).catch(console.warn);
    } else if(p.shares!=null&&p.fixed_value==null){
      priceStatus[key]='err'; failCount++;
    }
  }

  // Log history & snapshot
  if(historyRows.length){
    sbPost('price_history',historyRows).catch(console.warn);
    const T=getTotal();
    sbPost('portfolio_snapshots',{
      total_value:T,
      total_invested:positions.filter(p=>p.value&&!['Cash','Home'].includes(p.bucket)).reduce((s,p)=>s+(p.value||0),0),
      total_cash:positions.filter(p=>p.bucket==='Cash'&&p.value).reduce((s,p)=>s+(p.value||0),0),
      total_crypto:positions.filter(p=>p.bucket==='Crypto'&&p.value).reduce((s,p)=>s+(p.value||0),0),
      snapshot_at:now,
    }).catch(console.warn);
  }

  lastUpdated=now;
  btn.disabled=false; icon.classList.remove('spinning');
  renderAll();

  if(failCount>0&&updCount===0) toast(`⚠ All price fetches failed. Deploy the Edge Function.`,'err');
  else if(failCount>0) toast(`✓ ${updCount} updated · ${failCount} failed`,'err');
  else toast(`✓ All ${updCount} prices updated`,'ok');
}

// ─── TOTALS ──────────────────────────────────────────────────────────────────
function getTotal(){ return positions.reduce((s,p)=>s+(p.value||0),0); }
function getBT(){ const bt={}; positions.forEach(p=>{ if(p.value) bt[p.bucket]=(bt[p.bucket]||0)+p.value; }); return bt; }

// ─── SUMMARY ─────────────────────────────────────────────────────────────────
function renderSummary(){
  const T=getTotal();
  const inv=positions.filter(p=>p.value&&!['Cash','Home'].includes(p.bucket)).reduce((s,p)=>s+(p.value||0),0);
  const cash=positions.filter(p=>p.bucket==='Cash'&&p.value).reduce((s,p)=>s+(p.value||0),0);
  const crypto=positions.filter(p=>p.bucket==='Crypto'&&p.value).reduce((s,p)=>s+(p.value||0),0);
  const eq=positions.filter(p=>!['Cash','Home','Crypto'].includes(p.bucket)&&p.value).reduce((s,p)=>s+(p.value||0),0);
  const plPs=positions.filter(p=>p.pl_usd!=null);
  const tpl=plPs.reduce((s,p)=>s+(p.pl_usd||0),0);
  document.getElementById('summary-bar').innerHTML=[
    {label:'Total',       val:fD(T),    sub:`${positions.filter(p=>p.value).length} positions`, cls:''},
    {label:'Invested',    val:fD(inv),  sub:`${T?((inv/T)*100).toFixed(1):0}% deployed`,        cls:'accent'},
    {label:'Cash',        val:fD(cash), sub:`${T?((cash/T)*100).toFixed(1):0}% of portfolio`,   cls:''},
    {label:'Equities',    val:fD(eq),   sub:`${T?((eq/T)*100).toFixed(1):0}% of portfolio`,     cls:''},
    {label:'Crypto',      val:fD(crypto),sub:`${T?((crypto/T)*100).toFixed(1):0}% of portfolio`,cls:''},
    {label:'Total P/L',   val:(tpl>=0?'+':'')+fD(tpl), sub:`${plPs.length} tracked`,           cls:tpl>=0?'green':'red'},
  ].map(c=>`<div class="scard"><div class="slabel">${c.label}</div><div class="sval ${c.cls}">${c.val}</div><div class="ssub">${c.sub}</div></div>`).join('');
}

function renderAllocBar(){
  const T=getTotal(),bt=getBT();
  document.getElementById('alloc-bar').innerHTML=Object.entries(bt).sort((a,b)=>b[1]-a[1])
    .map(([b,v])=>`<div class="alloc-seg" style="flex:${(v/T)*100};background:${BC[b]?.color||'#4a5568'}" title="${b}: ${((v/T)*100).toFixed(1)}%"></div>`).join('');
}

function renderBuckets(){
  const T=getTotal(),bt=getBT();
  document.getElementById('bucket-row').innerHTML=Object.entries(bt).sort((a,b)=>b[1]-a[1]).map(([b,v])=>{
    const cfg=BC[b]||{color:'#64748b'},pct=((v/T)*100).toFixed(1),isA=filterB===b;
    return `<div class="bpill${isA?' active':''}" onclick="clickBucket('${b}')" style="border-top-color:${isA?cfg.color:'transparent'}">
      <div class="bname" style="color:${cfg.color}">${b}</div><div class="bval">${fD(v)}</div><div class="bpct">${pct}%</div></div>`;
  }).join('');
}
function clickBucket(b){ filterB=(filterB===b)?'all':b; renderAll(); }

function renderFilters(){
  const buckets=[...new Set(positions.map(p=>p.bucket))].sort();
  document.getElementById('fgroup').innerHTML=
    `<button class="fbtn${filterB==='all'?' active':''}" onclick="setFilter('all')">ALL</button>`+
    buckets.map(b=>`<button class="fbtn${filterB===b?' active':''}" onclick="setFilter('${b}')">${b}</button>`).join('');
}
function setFilter(b){ filterB=b; renderAll(); }

        <label for="ck-${c.id}">${c.label||c.id}</label>
      </div>`).join('');
}
function toggleColDd(e){ e.stopPropagation(); document.getElementById('col-dd').classList.toggle('open'); }
function toggleCol(id,e){

  });
}
document.addEventListener('click',()=>document.getElementById('col-dd').classList.remove('open'));

// ─── PRICE DOT ───────────────────────────────────────────────────────────────
function priceDot(ticker){
  const st=priceStatus[ticker?.toUpperCase()]||'none';
  const map={ok:'dot-ok',err:'dot-err',none:'dot-none',loading:'dot-loading'};
  const title={ok:'Price updated ✓',err:'Price fetch failed',none:'Not yet refreshed',loading:'Fetching…'};
  return `<span class="price-dot ${map[st]}" title="${title[st]}"></span>`;
}

// ─── DESKTOP TABLE ───────────────────────────────────────────────────────────
function getFiltered(){
  let d=[...positions];
  if(filterB!=='all') d=d.filter(p=>p.bucket===filterB);
  if(searchQ){ const q=searchQ.toLowerCase(); d=d.filter(p=>[p.ticker,p.account,p.bucket,p.type].some(s=>(s||'').toLowerCase().includes(q))); }
  d.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(av===null||av===undefined) av=sortDir===1?Infinity:-Infinity;
    if(bv===null||bv===undefined) bv=sortDir===1?Infinity:-Infinity;
    if(typeof av==='string') av=av.toLowerCase();
    if(typeof bv==='string') bv=bv.toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  return d;
}

function renderThead(){
  document.getElementById('thead').innerHTML='<tr>'+COLS.map((c,i)=>`
    <th data-ci="${i}" class="${c.r?'r':''} ${c.sort?'sort':''} ${sortCol===c.id?'sorted':''}"
        ${c.sort?`onclick="doSort('${c.id}')"`:''}>
      ${c.label}${c.sort?`<span class="si">${sortCol===c.id?(sortDir===1?'↑':'↓'):'↕'}</span>`:''}</th>`).join('')+'</tr>';
}

function renderTable(){
  const T=getTotal(),data=getFiltered();
  const tbody=document.getElementById('tbody'),empty=document.getElementById('empty');
  if(!data.length){ tbody.innerHTML=''; empty.style.display='block'; document.getElementById('rcount').textContent='0 positions'; return; }
  empty.style.display='none';
  document.getElementById('rcount').textContent=`${data.length} position${data.length!==1?'s':''}`;

  tbody.innerHTML=data.map(p=>{
    const cfg=BC[p.bucket]||{cls:'b-cash',color:'#64748b'};
    const pct=p.value&&T?(p.value/T)*100:0;
    const barW=Math.min((pct/20)*100,100);
    const plUC=p.pl_usd!=null?(p.pl_usd>=0?'green':'red'):'';
    const plPC=p.pl_pct!=null?(p.pl_pct>=0?'green':'red'):'';
    return `<tr>
      <td data-ci="0"><span class="cticker">${p.ticker}</span></td>
      <td data-ci="1"><span class="cacct">${p.account}</span></td>
      <td data-ci="2"><span class="btag ${cfg.cls}"><span class="bdot" style="background:${cfg.color}"></span>${p.bucket}</span></td>
      <td data-ci="3" style="color:var(--muted2);font-size:11px">${p.type||''}</td>
      <td data-ci="4" style="text-align:right"><input class="editable" type="number" step="any" value="${p.shares??''}" placeholder="—" onchange="updField(${p.id},'shares',this.value)"></td>
      <td data-ci="5">
        <div class="price-cell">
          <span class="cprice">${fP(p.price)}</span>
          ${priceDot(p.ticker)}
        </div>
      </td>
      <td data-ci="6" class="cnum bold">${fD(p.value)}</td>
      <td data-ci="7"><div class="pbar-wrap"><div class="pbar"><div class="pbar-fill" style="width:${barW}%;background:${cfg.color}"></div></div><span class="pbar-label">${pct.toFixed(1)}%</span></div></td>
      <td data-ci="8" style="text-align:right"><input class="editable dim" type="number" step="any" value="${p.cost_basis??''}" placeholder="—" onchange="updField(${p.id},'cost_basis',this.value)"></td>
      <td data-ci="9"  class="cnum ${plUC}">${p.pl_usd!=null?(p.pl_usd>=0?'+':'')+fD(p.pl_usd):'—'}</td>
      <td data-ci="10" class="cnum ${plPC}">${p.pl_pct!=null?(p.pl_pct>=0?'+':'')+p.pl_pct.toFixed(2)+'%':'—'}</td>
      <td data-ci="11"><span class="atog ${ACT_CLS[p.action]||'at-hold'}" onclick="cycleAction(${p.id})">${ACT_LABELS[p.action]||'HOLD'}</span></td>
      <td data-ci="12" style="min-width:140px;max-width:200px"><textarea class="note-inp" rows="1" placeholder="Add note…" onchange="updField(${p.id},'notes',this.value)" onfocus="rz(this)" onblur="rz(this)">${p.notes||''}</textarea></td>
      <td data-ci="13"><button class="del-btn" onclick="delPos(${p.id})" title="Remove">✕</button></td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('.note-inp').forEach(rz);
  applyColVis();
}
function doSort(col){ if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=-1;} renderThead(); renderTable(); }

// ─── MOBILE CARDS ────────────────────────────────────────────────────────────
function renderCards(){
  const T=getTotal();
  let data=[...positions];
  if(filterB!=='all') data=data.filter(p=>p.bucket===filterB);
  if(searchQ){ const q=searchQ.toLowerCase(); data=data.filter(p=>[p.ticker,p.account,p.bucket].some(s=>(s||'').toLowerCase().includes(q))); }
  data.sort((a,b)=>(b.value||0)-(a.value||0));

  const grid=document.getElementById('card-grid');
  if(!data.length){ grid.innerHTML='<div class="empty">No positions match.</div>'; return; }

  grid.innerHTML=data.map(p=>{
    const cfg=BC[p.bucket]||{cls:'b-cash',color:'#64748b'};
    const pct=p.value&&T?((p.value/T)*100).toFixed(1):'0.0';
    const plUC=p.pl_usd!=null?(p.pl_usd>=0?'green':'red'):'';
    const plTxt=p.pl_usd!=null?`${p.pl_usd>=0?'+':''}${fD(p.pl_usd)} (${p.pl_pct>=0?'+':''}${p.pl_pct?.toFixed(1)}%)`:'—';
    const aCls=ACT_CLS[p.action]||'at-hold';
    const aLbl=ACT_LABELS[p.action]||'HOLD';
    const dot=priceDot(p.ticker);

    return `<div class="pos-card" id="card-${p.id}" style="--card-color:${cfg.color}">
      <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:${cfg.color};border-radius:10px 0 0 10px"></div>
      <div class="card-header">
        <div>
          <div class="card-ticker">${p.ticker}</div>
          <div class="card-account">${p.account}</div>
        </div>
        <span class="card-action ${aCls}" onclick="cycleAction(${p.id})" style="cursor:pointer">${aLbl}</span>
      </div>
      <div class="card-value">${fD(p.value)}</div>
      <div class="card-price-row">
        <span class="card-price">${fP(p.price)}</span>
        ${dot}
        <span class="card-price" style="color:var(--muted)">${fS(p.shares)} shares</span>
      </div>
      <div class="card-pl ${plUC}">${plTxt}</div>
      <div class="card-footer">
        <span class="card-pct">${pct}% of portfolio</span>
        <span class="card-bucket ${cfg.cls}">${p.bucket}</span>
      </div>
      <!-- Expandable detail -->
      <div class="card-expand" id="expand-${p.id}">
        <div class="card-row">
          <span class="card-row-label">Shares</span>
          <input class="card-edit" type="number" step="any" value="${p.shares??''}" placeholder="—" onchange="updField(${p.id},'shares',this.value)">
        </div>
        <div class="card-row">
          <span class="card-row-label">Cost Basis</span>
          <input class="card-edit" type="number" step="any" value="${p.cost_basis??''}" placeholder="—" onchange="updField(${p.id},'cost_basis',this.value)">
        </div>
        <textarea class="card-note" rows="2" placeholder="Notes…" onchange="updField(${p.id},'notes',this.value)">${p.notes||''}</textarea>
        <button class="card-del" onclick="delPos(${p.id})">Remove Position</button>
      </div>
    </div>`;
  }).join('');

  // Tap card body (not controls) to expand/collapse
  grid.querySelectorAll('.pos-card').forEach(card=>{
    card.addEventListener('click', e=>{
      if(e.target.closest('.card-expand,.card-action,.card-del,.card-edit,.card-note')) return;
      const id=card.id.replace('card-','');
      const exp=document.getElementById(`expand-${id}`);
      exp.classList.toggle('open');
    });
  });
}

// ─── INLINE EDITS ────────────────────────────────────────────────────────────
async function updField(id,field,rawVal){
  const p=positions.find(p=>p.id===id); if(!p) return;
  p[field]=rawVal===''||rawVal===null?null:(field==='notes'?rawVal:parseFloat(rawVal));
  compute(p);
  renderSummary(); renderAllocBar(); renderBuckets();
  if(isMobileView) renderCards(); else renderTable();
  try{ await sbPatch('positions',id,{[field]:p[field]}); }
  catch(e){ toast(`Save failed: ${e.message}`,'err'); }
}
async function cycleAction(id){
  const p=positions.find(p=>p.id===id); if(!p) return;
  p.action=ACT_CYCLE[(ACT_CYCLE.indexOf(p.action)+1)%ACT_CYCLE.length];
  if(isMobileView) renderCards(); else renderTable();
  try{ await sbPatch('positions',id,{action:p.action}); }
  catch(e){ toast(`Save failed: ${e.message}`,'err'); }
}
async function delPos(id){
  if(!confirm('Remove this position?')) return;
  positions=positions.filter(p=>p.id!==id); computeAll(); renderAll();
  try{ await sbDelete('positions',id); toast('Position removed'); }
  catch(e){ toast(`Delete failed: ${e.message}`,'err'); }
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(p=null){
  editingId=p?.id||null;
  document.getElementById('modal-title').textContent=p?'Edit Position':'Add Position';
  document.getElementById('m-ticker').value=p?.ticker||'';
  document.getElementById('m-account').value=p?.account||'Robinhood';
  document.getElementById('m-bucket').value=p?.bucket||'AI Long Term';
  document.getElementById('m-type').value=p?.type||'Growth';
  document.getElementById('m-shares').value=p?.shares??'';
  document.getElementById('m-cost').value=p?.cost_basis??'';
  document.getElementById('m-action').value=p?.action||'hold';
  document.getElementById('m-fixed').value=p?.fixed_value??'';
  document.getElementById('m-notes').value=p?.notes||'';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-ticker').focus(),50);
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editingId=null; }
function closeModalOut(e){ if(e.target.id==='modal') closeModal(); }

async function saveModal(){
  const ticker=document.getElementById('m-ticker').value.trim().toUpperCase();
  if(!ticker){ toast('Ticker is required','err'); return; }
  const body={
    ticker, account:document.getElementById('m-account').value,
    bucket:document.getElementById('m-bucket').value, type:document.getElementById('m-type').value,
    shares:parseFloat(document.getElementById('m-shares').value)||null,
    cost_basis:parseFloat(document.getElementById('m-cost').value)||null,
    fixed_value:parseFloat(document.getElementById('m-fixed').value)||null,
    action:document.getElementById('m-action').value,
    notes:document.getElementById('m-notes').value||null, price:null,
  };
  try{
    if(editingId){
      await sbPatch('positions',editingId,body);
      const p=positions.find(p=>p.id===editingId); Object.assign(p,body); compute(p);
      toast('Position updated ✓','ok');
    } else {
      const ins=await sbPost('positions',body);
      positions.push(compute({...ins[0]}));
      priceStatus[ticker]='none';
      toast('Position added ✓','ok');
    }
    closeModal(); computeAll(); renderAll();
  } catch(e){ toast(`Save failed: ${e.message}`,'err'); console.error(e); }
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function rz(el){ el.style.height='auto'; el.style.height=Math.max(24,el.scrollHeight)+'px'; }
function updateUpdatedInfo(){
  const el=document.getElementById('upd-time');
  if(!lastUpdated){ el.textContent='never'; el.className='upd-stale'; return; }
  const d=new Date(lastUpdated);
  el.textContent=d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  el.className='upd-time';
}

// ─── RENDER ALL ──────────────────────────────────────────────────────────────
function renderAll(){
  renderSummary(); renderAllocBar(); renderBuckets();
  renderFilters(); updateUpdatedInfo();
  if(isMobileView){ renderCards(); }
  else { renderThead(); renderTable(); buildColDd(); }
}

document.getElementById('search').addEventListener('input',e=>{ searchQ=e.target.value.trim(); isMobileView?renderCards():renderTable(); });

// ─── INIT ────────────────────────────────────────────────────────────────────
(async()=>{
  const ok=await loadPositions();
  document.getElementById('loading-screen').classList.add('gone');
  if(ok){ applyView(); renderAll(); }
})();
</script>
